<!DOCTYPE html>
<html>
<head>
    <title>Task 02 </title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f9fafb;
    color: #222;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #010100;
    margin-bottom: 30px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

.card {
    background: #eae4e4;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

h2 {
    text-align: center;
    color: #d4a200;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: #d3f588;
    color: #111;
}

input:focus, textarea:focus {
    outline: none;
    border: 2px solid #ebe7cd;
}

input::placeholder, textarea::placeholder {
    color: #666;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #ffd700;
    border: none;
    color: black;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ffcc00;
}

/* ERROR + SUCCESS */
.error {
    color: #ff4d4d;
    font-size: 12px;
    display: none;
}

.success {
    color: #00b86b;
    text-align: center;
    display: none;
    margin-top: 10px;
}

/* TODO LIST */
ul {
    padding: 0;
}

li {
    list-style: none;
    background: #f3f4f6;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #111;
}

li button {
    width: auto;
    background: #ff4d4d;
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>✨ Task 02</h1>

    <div class="grid">

        <!-- FORM -->
        <div class="card">
            <h2>Contact</h2>

            <form onsubmit="return validateForm()">

                <input type="text" id="name" placeholder="Name">
                <div class="error" id="nameError">Enter name</div>

                <input type="text" id="email" placeholder="Email">
                <div class="error" id="emailError">Invalid email</div>

                <textarea id="message" placeholder="Message"></textarea>
                <div class="error" id="msgError">Enter message</div>

                <button type="submit">Send</button>

                <div class="success" id="successMsg">✔ Sent Successfully</div>

            </form>
        </div>

        <!-- TODO -->
        <div class="card">
            <h2>To-Do</h2>

            <input type="text" id="taskInput" placeholder="Add task...">
            <button onclick="addTask()">Add</button>

            <ul id="taskList"></ul>
        </div>

    </div>

</div>

<script>

window.onload = loadTasks;

function validateForm() {
    let name = val("name");
    let email = val("email");
    let message = val("message");

    hideErrors();
    let valid = true;

    let pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if (!name) { show("nameError"); valid = false; }
    if (!email.match(pattern)) { show("emailError"); valid = false; }
    if (!message) { show("msgError"); valid = false; }

    if (valid) {
        document.getElementById("successMsg").style.display = "block";
    }

    return false;
}

function val(id) {
    return document.getElementById(id).value.trim();
}

function show(id) {
    document.getElementById(id).style.display = "block";
}

function hideErrors() {
    document.querySelectorAll(".error").forEach(e => e.style.display = "none");
}

function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value.trim();

    if (!task) return alert("Enter task!");

    addUI(task);
    save(task);
    input.value = "";
}

function addUI(task) {
    let li = document.createElement("li");
    li.innerHTML = `${task} <button onclick="removeTask(this)">X</button>`;
    document.getElementById("taskList").appendChild(li);
}

function save(task) {
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks.push(task);
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function loadTasks() {
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks.forEach(addUI);
}

function removeTask(btn) {
    let li = btn.parentElement;
    let text = li.firstChild.textContent.trim();
    li.remove();

    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks = tasks.filter(t => t !== text);
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

</script>

</body>
</html>
